<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Móvil - Equipo Luis, Carlos, Oscar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-bottom: 40px; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .label-bold { font-weight: 700; color: #444; margin-top: 10px; font-size: 0.9rem; }
        .resaltado-verde { background-color: #eafaf1; font-weight: bold; color: #157347 !important; border: 1px solid #d1e7dd; }
        .btn-registrar { padding: 18px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; margin-top: 15px; transition: 0.3s; }
        .header-top { background: #212529; color: white; padding: 20px; border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        /* Estilos para el panel de Jefe */
        #panelJefe { display: none; background: white; border-radius: 15px; padding: 20px; margin-top: 20px; border: 2px solid #0d6efd; }
        .ticket { font-family: 'Courier New', Courier, monospace; background: #fff; padding: 15px; border: 1px solid #ddd; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="header-top text-center shadow">
    <h4 class="mb-0">Control de Ventas y Comisiones</h4>
    <small>Equipo: Luis - Carlos - Oscar</small>
</div>

<div class="container">
    <div class="card mb-3 shadow-sm">
        <div class="card-body py-2">
            <div class="row align-items-center">
                <div class="col-7">
                    <label class="label-bold mt-0">TC Hoy:</label>
                    <input type="number" id="tc_dia" class="form-control form-control-sm" value="9.45" oninput="calcularTodo()">
                </div>
                <div class="col-5 text-end">
                    <small class="text-muted">Comisión 30%</small>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <label class="label-bold">Vendedor:</label>
            <select id="vendedor" class="form-select mb-2 border-primary">
                <option value="Milo">Milo</option>
                <option value="Yef">Yef</option>
                <option value="Brandom">Brandom</option>
            </select>

            <label class="label-bold">Modelo del Equipo:</label>
            <input type="text" id="modelo" class="form-control mb-2" placeholder="Ej: iPhone 15 Pro Max">

            <div class="row">
                <div class="col-6">
                    <label class="label-bold text-success">Venta (Bs):</label>
                    <input type="number" id="precio_bs" class="form-control mb-2" placeholder="0" oninput="calcularTodo()">
                </div>
                <div class="col-6">
                    <label class="label-bold text-danger">Costo (USD):</label>
                    <input type="number" id="costo_real_usd" class="form-control mb-2" placeholder="0" oninput="calcularTodo()">
                </div>
            </div>

            <hr class="my-3">

            <div class="row text-center mb-3">
                <div class="col-6">
                    <small class="text-muted d-block">Ganancia (Bs)</small>
                    <input type="text" id="diferencia_bs" class="form-control resaltado-verde text-center" readonly>
                </div>
                <div class="col-6">
                    <small class="text-primary d-block fw-bold">Comisión (Bs)</small>
                    <h3 id="vista_comision" class="text-primary mb-0">0.00</h3>
                </div>
            </div>

            <label class="label-bold">Nota / Detalle de la venta:</label>
            <textarea id="nota" class="form-control mb-3" rows="2" placeholder="Ej: Pago QR, falta protector, cliente recomendado..."></textarea>

            <button onclick="registrarVenta()" id="btnRegistrar" class="btn btn-primary w-100 btn-registrar">
                GUARDAR EN SISTEMA
            </button>
        </div>
    </div>

    <div class="text-center mt-4">
        <button class="btn btn-sm btn-outline-secondary" onclick="accesoJefe()" style="border:none; opacity: 0.5;">🔒 Acceso Administración</button>
    </div>

    <div id="panelJefe" class="shadow">
        <h5 class="text-center">📊 Cierre de Caja (Modo Jefe)</h5>
        <div class="mb-3">
            <label class="label-bold">Filtrar por:</label>
            <div class="btn-group w-100" role="group">
                <button type="button" class="btn btn-outline-primary active" onclick="generarReporte('hoy')">Hoy</button>
                <button type="button" class="btn btn-outline-primary" onclick="generarReporte('semanal')">Semana</button>
                <button type="button" class="btn btn-outline-primary" onclick="generarReporte('mensual')">Mes</button>
            </div>
        </div>
        
        <div id="ticketContainer" class="ticket shadow-sm mb-3">
            <p class="text-center"><em>Seleccione un filtro para ver el ticket</em></p>
        </div>
        
        <button class="btn btn-dark w-100 mb-2" onclick="window.print()">🖨️ Imprimir Ticket</button>
        <button class="btn btn-light w-100" onclick="cerrarPanel()">Cerrar Panel</button>
    </div>
</div>

<script>
    // Variable para guardar historial local (opcional, para que el ticket funcione en el momento)
    let ventasLocales = JSON.parse(localStorage.getItem('ventas_recientes')) || [];

    function calcularTodo() {
        const bsVenta = parseFloat(document.getElementById('precio_bs').value) || 0;
        const tc = parseFloat(document.getElementById('tc_dia').value) || 0;
        const costoUsd = parseFloat(document.getElementById('costo_real_usd').value) || 0;
        const costoEnBs = costoUsd * tc;
        const margenBs = bsVenta - costoEnBs;
        document.getElementById('diferencia_bs').value = margenBs.toFixed(2);
        const comisionBs = margenBs > 0 ? (margenBs * 0.30) : 0;
        document.getElementById('vista_comision').innerText = comisionBs.toFixed(2);
    }

    function accesoJefe() {
        const pin = prompt("Ingrese PIN de seguridad:");
        if(pin === "582047") { // <--- CAMBIA TU PIN AQUÍ
            document.getElementById('panelJefe').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            alert("PIN Incorrecto");
        }
    }

    function cerrarPanel() {
        document.getElementById('panelJefe').style.display = 'none';
    }

    function registrarVenta() {
        const btn = document.getElementById('btnRegistrar');
        const url_google = "https://script.google.com/macros/s/AKfycbyLJgLJUEL-MdkNRI5KiqDTahc4mueZQIsvG-UDfwDb1jPj7v0lcmdjp5RzD-SLPNXMBw/exec";

        const datos = {
            fecha: new Date().toISOString(), // Usamos ISO para filtrar mejor después
            fecha_legible: new Date().toLocaleString(),
            modelo: document.getElementById('modelo').value,
            precio_bs: parseFloat(document.getElementById('precio_bs').value),
            costo_usd: parseFloat(document.getElementById('costo_real_usd').value),
            margen_bs: parseFloat(document.getElementById('diferencia_bs').value),
            tc: document.getElementById('tc_dia').value,
            comision_bs: parseFloat(document.getElementById('vista_comision').innerText),
            vendedor: document.getElementById('vendedor').value,
            nota: document.getElementById('nota').value
        };

        if(!datos.modelo || !datos.precio_bs || !datos.costo_usd) { 
            alert("⚠️ Por favor completa los datos básicos."); 
            return; 
        }

        btn.disabled = true;
        btn.innerText = "Guardando...";

        // Guardamos localmente para el reporte inmediato
        ventasLocales.push(datos);
        localStorage.setItem('ventas_recientes', JSON.stringify(ventasLocales));

        fetch(url_google, {
            method: 'POST',
            mode: 'no-cors',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(datos)
        }).then(() => {
            alert("✅ Registro exitoso para " + datos.vendedor);
            btn.disabled = false;
            btn.innerText = "GUARDAR EN SISTEMA";
            // Limpiar campos
            document.getElementById('modelo').value = "";
            document.getElementById('precio_bs').value = "";
            document.getElementById('costo_real_usd').value = "";
            document.getElementById('nota').value = "";
            calcularTodo();
        }).catch(err => {
            alert("❌ Error: No se pudo guardar.");
            btn.disabled = false;
        });
    }

    function generarReporte(tipo) {
        let filtradas = [];
        const ahora = new Date();
        
        filtradas = ventasLocales.filter(v => {
            const fechaV = new Date(v.fecha);
            if(tipo === 'hoy') return fechaV.toDateString() === ahora.toDateString();
            if(tipo === 'semanal') return (ahora - fechaV) < (7 * 24 * 60 * 60 * 1000);
            if(tipo === 'mensual') return fechaV.getMonth() === ahora.getMonth() && fechaV.getFullYear() === ahora.getFullYear();
        });

        let totalVenta = 0;
        let totalGanancia = 0;
        let totalComisiones = 0;

        filtradas.forEach(v => {
            totalVenta += v.precio_bs;
            totalGanancia += v.margen_bs;
            totalComisiones += v.comision_bs;
        });

        let utilidadLimpia = totalGanancia - totalComisiones;

        const ticketHTML = `
            <div class="text-center">
                <strong>TICKET DE CIERRE (${tipo.toUpperCase()})</strong><br>
                <span>${ahora.toLocaleString()}</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between"><span>Ventas Totales:</span> <span>Bs ${totalVenta.toFixed(2)}</span></div>
            <div class="d-flex justify-content-between"><span>Ganancia Bruta:</span> <span>Bs ${totalGanancia.toFixed(2)}</span></div>
            <div class="d-flex justify-content-between text-danger"><span>Comisiones (30%):</span> <span>-Bs ${totalComisiones.toFixed(2)}</span></div>
            <hr>
            <div class="d-flex justify-content-between fw-bold text-success" style="font-size:1.1rem">
                <span>UTILIDAD JEFE:</span> <span>Bs ${utilidadLimpia.toFixed(2)}</span>
            </div>
            <hr>
            <small>Cantidad de equipos: ${filtradas.length}</small>
        `;
        
        document.getElementById('ticketContainer').innerHTML = ticketHTML;
    }
</script>
</body>
</html>
